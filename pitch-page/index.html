<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlertVibe | Done-For-You Instagram Comment Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --muted: #a0a0a0;
            --accent: #b8924a;
            --border: #222222;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        nav {
            padding: 32px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .hero {
            padding: 90px 24px 100px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 32px;
        }

        .hero p {
            color: var(--muted);
            font-size: clamp(17px, 2vw, 21px);
            max-width: 680px;
            margin: 0 auto 48px;
            font-weight: 300;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            border-top: 1px solid var(--border);
        }

        .grid-item {
            padding: 64px 48px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .grid-item:last-child { border-right: none; }

        .tag {
            color: var(--accent);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 24px;
            display: block;
        }

        .grid-item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 32px;
            min-height: 60px;
            display: flex;
            align-items: flex-start;
            line-height: 1.3;
        }

        .grid-item p {
            color: var(--muted);
            font-size: 15px;
            font-weight: 300;
            flex-grow: 1;
        }
